services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: slc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: slc_user
      POSTGRES_PASSWORD: slc_pass
      POSTGRES_DB: slc_db
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U slc_user -d slc_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: slc_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: slc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: slc_minio_access
      MINIO_ROOT_PASSWORD: slc_minio_secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  # ── NestJS API ───────────────────────────────────────────────────────────────
  # Build context is the repo ROOT so the Dockerfile can copy prisma/schema.prisma
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: slc_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://slc_user:slc_pass@db:5432/slc_db?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: slc_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api/v1
    ports:
      - '3000:3000'
    depends_on:
      - api

  # ── Background Worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.worker
    container_name: slc_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://slc_user:slc_pass@db:5432/slc_db?schema=public
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
  minio_data:
