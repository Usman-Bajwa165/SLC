name: SLC CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_API: ${{ github.repository }}/slc-api
  IMAGE_WEB: ${{ github.repository }}/slc-web

jobs:
  # ── Test & Lint ──────────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: slc_user
          POSTGRES_PASSWORD: slc_pass
          POSTGRES_DB: slc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate

      - name: Run DB migrations (test)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://slc_user:slc_pass@localhost:5432/slc_test
        run: npx prisma migrate deploy

      - name: Lint API
        working-directory: apps/api
        run: npm run lint

      - name: Run API tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://slc_user:slc_pass@localhost:5432/slc_test
          REDIS_URL: redis://localhost:6379
        run: npm run test:cov

      - name: Type-check frontend
        working-directory: apps/web
        run: npx tsc --noEmit

  # ── Build & Push Docker Images ───────────────────────────────────────────────
  build:
    name: Build Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_API }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_API }}:${{ github.sha }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:latest,${{ env.REGISTRY }}/${{ env.IMAGE_WEB }}:${{ github.sha }}
